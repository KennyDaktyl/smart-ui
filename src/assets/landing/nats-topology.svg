<svg width="840" height="420" viewBox="0 0 840 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08131F"/>
      <stop offset="1" stop-color="#0F2C3D"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F7B733"/>
      <stop offset="1" stop-color="#20E3B2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="840" height="420" rx="24" fill="url(#bg)"/>

  <rect x="350" y="150" width="140" height="120" rx="18" fill="#102C42" stroke="#20E3B2"/>
  <text x="420" y="195" text-anchor="middle" fill="#E8F1F8" font-family="Arial" font-size="24" font-weight="700">NATS</text>
  <text x="420" y="222" text-anchor="middle" fill="#98B7C7" font-family="Arial" font-size="14">event bus</text>

  <g filter="url(#glow)">
    <line x1="180" y1="115" x2="350" y2="175" stroke="url(#line)" stroke-width="4"/>
    <line x1="180" y1="305" x2="350" y2="245" stroke="url(#line)" stroke-width="4"/>
    <line x1="490" y1="175" x2="660" y2="115" stroke="url(#line)" stroke-width="4"/>
    <line x1="490" y1="245" x2="660" y2="305" stroke="url(#line)" stroke-width="4"/>
  </g>

  <rect x="80" y="70" width="200" height="90" rx="14" fill="#0D2335" stroke="#2DB7F5"/>
  <text x="180" y="104" text-anchor="middle" fill="#D9F3FF" font-family="Arial" font-size="16" font-weight="700">Raspberry Agent A</text>
  <text x="180" y="126" text-anchor="middle" fill="#91B5C8" font-family="Arial" font-size="12">GPIO 12V command</text>

  <rect x="80" y="260" width="200" height="90" rx="14" fill="#0D2335" stroke="#2DB7F5"/>
  <text x="180" y="294" text-anchor="middle" fill="#D9F3FF" font-family="Arial" font-size="16" font-weight="700">Raspberry Agent B</text>
  <text x="180" y="316" text-anchor="middle" fill="#91B5C8" font-family="Arial" font-size="12">Heartbeat + telemetry</text>

  <rect x="560" y="70" width="200" height="90" rx="14" fill="#102B1D" stroke="#20E3B2"/>
  <text x="660" y="104" text-anchor="middle" fill="#DBFFEF" font-family="Arial" font-size="16" font-weight="700">Dashboard UI</text>
  <text x="660" y="126" text-anchor="middle" fill="#9FD6C0" font-family="Arial" font-size="12">device state stream</text>

  <rect x="560" y="260" width="200" height="90" rx="14" fill="#102B1D" stroke="#20E3B2"/>
  <text x="660" y="294" text-anchor="middle" fill="#DBFFEF" font-family="Arial" font-size="16" font-weight="700">Provider Telemetry</text>
  <text x="660" y="316" text-anchor="middle" fill="#9FD6C0" font-family="Arial" font-size="12">power + energy charts</text>
</svg>
